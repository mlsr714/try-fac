commands:
  install: npm install
  dev: npm run dev -- -p 3100
  build: npm run build
  typecheck: npx tsc --noEmit
  test: npx vitest run --reporter=verbose
  lint: npx next lint
  db:push: npx drizzle-kit push
  db:generate: npx drizzle-kit generate
  db:migrate: npx drizzle-kit migrate

services:
  web:
    start: npm run dev -- -p 3100
    stop: lsof -ti :3100 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3100 || curl -sf http://localhost:3100/api/health
    port: 3100
    depends_on: []
